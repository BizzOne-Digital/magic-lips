<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1D4ED8" stop-opacity="0.1"/>
    </radialGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="50%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="blueText" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <!-- Lips shape -->
  <ellipse cx="100" cy="85" rx="55" ry="30" fill="#F9A8D4" opacity="0.9"/>
  <path d="M 60 80 Q 80 65 100 70 Q 120 65 140 80 Q 120 95 100 90 Q 80 95 60 80 Z" fill="#EC4899" opacity="0.7"/>
  <!-- Wand -->
  <line x1="125" y1="60" x2="155" y2="35" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
  <polygon points="155,30 158,37 152,37" fill="#FCD34D"/>
  <!-- Sparkles -->
  <text x="155" y="33" font-size="8" fill="#FCD34D">✦</text>
  <text x="130" y="50" font-size="6" fill="#FCD34D">✦</text>
  <!-- Text Magic -->
  <text x="100" y="130" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="url(#goldText)">Magic</text>
  <!-- Text Lips -->
  <text x="100" y="160" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="url(#blueText)">Lips</text>
</svg>
